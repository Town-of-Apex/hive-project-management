services:
  apex-backend:
    container_name: hive-backend
    build: .
    restart: unless-stopped
    environment:
      - BASE_PATH=/hive
      - DATABASE_URL=sqlite:///./data/app.db
    volumes:
      - hive-data:/app/data
    networks:
      - apex-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.apex-backend.rule=PathPrefix(`/demo/api`) || Path(`/demo/app_metadata.json`)"
      - "traefik.http.routers.apex-backend.entrypoints=web"
      - "traefik.http.services.apex-backend.loadbalancer.server.port=8080"
      - "traefik.docker.network=apex-internal"
    ports:
      - "8080:8080"

  apex-frontend:
    container_name: hive-frontend
    build: ./frontend
    restart: unless-stopped
    networks:
      - apex-internal
    environment:
      - BASE_PATH=/hive
      - CHOKIDAR_USEPOLLING=true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.apex-frontend.rule=PathPrefix(`/demo`)"
      - "traefik.http.routers.apex-frontend.entrypoints=web"
      - "traefik.http.services.apex-frontend.loadbalancer.server.port=5173"
      - "traefik.docker.network=apex-internal"
    ports:
      - "5173:5173"

  apex-db:
    container_name: apex-db
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=apex_db
    volumes:
      - apex-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - apex-internal

volumes:
  apex-demo-data:
  apex-db-data:

networks:
  apex-internal:
    external: true
